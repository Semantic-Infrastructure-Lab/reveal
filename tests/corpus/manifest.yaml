# Real-corpus dogfood manifest — the single source of truth for the large
# open-source repos used for exploratory, real-world validation of reveal's
# analyzers (Layer 3 of internal-docs/planning/POPULAR_LANGUAGE_VALIDATION_STRATEGY_2026-07-03.md).
#
# WHY THIS FILE EXISTS
# Previously these repos were cloned by hand into a gitignored `samples/`
# directory sibling to the repo, with the repo→language→SHA mapping recorded
# only as prose in a planning doc (which drifted: it listed 8 repos while 18
# existed on disk). That made real-corpus findings non-reproducible — a finding
# citing "calls:// misses 599/602 sites in Godot" silently rots the moment
# upstream moves, and nobody can re-materialize the exact tree it came from.
#
# This manifest pins each corpus to an exact commit. scripts/fetch_corpus.py
# reads it and materializes each repo (blobless, single-commit, no history) into
# a shared cache at $REVEAL_CORPUS_DIR or ~/.cache/reveal-corpus/<language>/.
#
# TWO KINDS OF TESTING, DELIBERATELY SEPARATED
#   - Deterministic regression tests (CI, tests/test_conformance_matrix.py,
#     tests/test_smoke_tier.py) use tiny HAND-WRITTEN fixtures under
#     tests/fixtures/ — committed, reproducible, no license entanglement. They
#     do NOT depend on this corpus.
#   - Exploratory real-corpus dogfood (occasional, maintainer-run, finds new
#     idiom/scale bugs) uses this corpus. Tests that reference it MUST skip
#     cleanly when the corpus is absent (see tests/corpus_paths.py).
#
# EXTRACTING A REAL FILE INTO A COMMITTED FIXTURE
# When a real-corpus file exercises a bug worth pinning forever, prefer copying
# that single file into tests/fixtures/corpus/<language>/ with a header citing
# source repo + sha + path. Do this ONLY from permissively-licensed sources
# (MIT/BSD/Apache, see `license` below). For copyleft/restrictive sources
# (GPL/AGPL/SSPL) write a minimal hand-authored reproduction instead — your own
# code, deterministic, no license question.
#
# RE-PINNING: entries with `sha: null` were snapshotted on 2026-07-02 before
# this manifest existed and their local .git was already removed, so the exact
# commit is unrecoverable. fetch_corpus.py clones the default branch HEAD for
# them and prints the resolved SHA — paste it back here to pin.

version: 1
cache_dir_default: "~/.cache/reveal-corpus"

