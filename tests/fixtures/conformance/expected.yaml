  - {kind: cache, line: 41}

cpp:
  entry_function: process_order
  outline_functions: [validate, process_order, run]
  calls_validate_callers:
  - {line: 15, function: process_order}
  imports_unused:
    not_supported: true  # C/C++ generic import analyzer doesn't do unused-#include detection
  varflow_result:
  - {kind: WRITE, line: 16}
  - {kind: "READ/COND", line: 17}
  - {kind: READ, line: 20}     # inside CHECK_OR_RETURN(...) macro invocation (BACK-421 part 3)
  - {kind: READ, line: 25}
  - {kind: WRITE, line: 27}
  - {kind: READ, line: 27}
  - {kind: READ, line: 28}
  sideeffects:
  - {line: 21, kind: file}
  - {line: 26, kind: file}
  # BACK-421 part 3 (RESOLVED): macro-hidden early return, line 20
  # (`CHECK_OR_RETURN(result < 1000, -1)` expands to `if (!(cond)) return (val)`)
  # is invisible to node-kind matching alone — tree-sitter parses the raw
  # source, not the preprocessor-expanded form, so the macro invocation is
  # just a plain call_expression, not an if_statement/return_statement node.
  # Fixed via callee-name heuristics (nav_exits._is_exit_call): known C++
  # error-macro names/prefixes (CHECK_OR_RETURN, ERR_FAIL_*) are treated as
  # an EXIT the same way die/exit/raise/fail already were for other languages.
  exits:
  - {kind: RETURN, line: 18}
  - {kind: EXIT, line: 20}
  - {kind: RETURN, line: 23}
  - {kind: RETURN, line: 28}
  ifmap:
  - {keyword: IF, line_start: 17}
  - {keyword: IF, line_start: 22}
  catchmap:
    not_supported: true  # C++ fixture uses return-code error handling, no try/catch
  mutations_probe: {range: "16-16", var: result, next_read_line: 17}
  returns:
  - {line: 18, gate_lines: [17]}
  - {line: 20, gate_lines: []}
  - {line: 23, gate_lines: [22]}
  - {line: 28, gate_lines: []}
  # `Batch.run` named extraction fails for C++ (BACK-451, filed not fixed) —
  # a :LINE-RANGE covering the whole method is the workaround, same shape
  # as the mutations_probe range above.
  batch_element: ":38-47"
  loopmap:
  - {keyword: FOR, line_start: 42}
  fanout_effects:
  - {line: 44, kind: cache}
  statewrites:
  - {kind: field, line: 43}
  - {kind: cache, line: 44}

