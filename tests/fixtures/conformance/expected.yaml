  varflow_result:
    - {kind: WRITE, line: 14}
    - {kind: "READ/COND", line: 15}
    - {kind: READ, line: 22}
    - {kind: WRITE, line: 24}
    - {kind: READ, line: 24}
    - {kind: READ, line: 25}
  sideeffects:
    - {line: 18, kind: file}
    - {line: 23, kind: file}

