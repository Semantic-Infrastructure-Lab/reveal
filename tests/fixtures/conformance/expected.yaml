# BACK-422 Tier 1 conformance matrix — ground truth per language.
#
# Each fixture is tests/fixtures/conformance/<lang>/sample.<ext>, hand-written
# to exercise the same shape in every language: a validate() helper called by
# process_order()/processOrder(), a used + an unused import, one file-effect
# call, and a variable (`result`) that is declared-with-initializer, read,
# reassigned, and read again.
#
# `not_supported: true` on a block means the language genuinely doesn't have
# the feature yet (an honest gap, per the BACK-403 precedent) — the test
# asserts the documented "not supported" shape, not a false clean pass.
#
# Tier 2 additions (BACK-422): exits/ifmap/catchmap/mutations_probe, run
# against entry_function (or a sub-range for mutations_probe, since
# --mutations is range-scoped: it flags a var written inside the range and
# read after it ends, so passing a whole function is always empty by design —
# not a bug). `ifmap`/`catchmap` are `not_supported: true` where the fixture's
# error-handling idiom genuinely doesn't use that language's if/try construct
# (e.g. c/cpp/go use if-based error returns, no try/catch; python/csharp/
# java/javascript/typescript use try/catch, no bare if in entry_function).

python:
  entry_function: process_order
  outline_functions: [validate, process_order, run]
  calls_validate_callers:
  - {line: 12, function: process_order}
  imports_unused: [sys]
  varflow_result:
  - {kind: WRITE, line: 13}
  - {kind: READ, line: 17}
  - {kind: WRITE, line: 20}
  - {kind: READ, line: 20}
  - {kind: READ, line: 21}
  sideeffects:
  - {line: 16, kind: file}
  exits:
  - {kind: RETURN, line: 19}
  - {kind: RETURN, line: 21}
  ifmap:
    not_supported: true  # entry_function uses try/except, no bare if
  catchmap:
  - {keyword: TRY, line_start: 14}
  - {keyword: EXCEPT, line_start: 18}
  mutations_probe: {range: "13-13", var: result, next_read_line: 17}
  returns:
  - {line: 19, gate_lines: []}
  - {line: 21, gate_lines: []}

c:
  entry_function: process_order
  outline_functions: [validate, process_order, run]
  calls_validate_callers:
  - {line: 12, function: process_order}
  imports_unused:
    not_supported: true  # C generic import analyzer doesn't do unused-#include detection
  varflow_result:
  - {kind: WRITE, line: 13}
  - {kind: "READ/COND", line: 14}     # variable used as a branch condition
  - {kind: READ, line: 21}
  - {kind: WRITE, line: 23}
  - {kind: READ, line: 23}
  - {kind: READ, line: 24}
  sideeffects:
  - {line: 17, kind: file}
  - {line: 22, kind: file}
  exits:
  - {kind: RETURN, line: 15}
  - {kind: RETURN, line: 19}
  - {kind: RETURN, line: 24}
  ifmap:
  - {keyword: IF, line_start: 14}
  - {keyword: IF, line_start: 18}
  catchmap:
    not_supported: true  # C has no try/catch
  mutations_probe: {range: "13-13", var: result, next_read_line: 14}
  returns:
  - {line: 15, gate_lines: [14]}
  - {line: 19, gate_lines: [18]}
  - {line: 24, gate_lines: []}

cpp:
  entry_function: process_order
  outline_functions: [validate, process_order, run]
  calls_validate_callers:
  - {line: 15, function: process_order}
  imports_unused:
    not_supported: true  # C/C++ generic import analyzer doesn't do unused-#include detection
  varflow_result:
  - {kind: WRITE, line: 16}
  - {kind: "READ/COND", line: 17}
  - {kind: READ, line: 20}     # inside CHECK_OR_RETURN(...) macro invocation (BACK-421 part 3)
  - {kind: READ, line: 25}
  - {kind: WRITE, line: 27}
  - {kind: READ, line: 27}
  - {kind: READ, line: 28}
  sideeffects:
  - {line: 21, kind: file}
  - {line: 26, kind: file}
  # Tier 2 (BACK-422/BACK-421): macro-hidden early return, line 20
  # (`CHECK_OR_RETURN(result < 1000, -1)` expands to `if (!(cond)) return (val)`)
  # is invisible to --exits/--returns/--ifmap — tree-sitter parses the raw
  # source, not the preprocessor-expanded form, so the macro invocation is
  # just a plain call_expression, not an if_statement/return_statement node.
  # BACK-421 part 3, confirmed on this minimal repro; fix needs macro-name
  # heuristics, not just node-kind matching — left open, not fixed this session.
  exits:
  - {kind: RETURN, line: 18}
  - {kind: RETURN, line: 23}
  - {kind: RETURN, line: 28}
  ifmap:
  - {keyword: IF, line_start: 17}
  - {keyword: IF, line_start: 22}
  catchmap:
    not_supported: true  # C++ fixture uses return-code error handling, no try/catch
  mutations_probe: {range: "16-16", var: result, next_read_line: 17}
  returns:
  - {line: 18, gate_lines: [17]}
  - {line: 23, gate_lines: [22]}
  - {line: 28, gate_lines: []}

