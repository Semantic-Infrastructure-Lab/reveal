rust:
  entry_function: process_order
  outline_functions: [validate, process_order, run]
  calls_validate_callers:
  - {line: 13, function: process_order}
  imports_unused: ["std::collections::HashMap"]
  varflow_result:
  - {kind: WRITE, line: 14}
  - {kind: "READ/COND", line: 15}    # inside `if let Err(e) = ...` condition (BACK-427)
  - {kind: WRITE, line: 18}
  - {kind: READ, line: 18}
  - {kind: READ, line: 19}
  sideeffects:
  - {line: 15, kind: file}
  # BACK-428 (RESOLVED): --exits now also finds Rust's two implicit exit
  # idioms alongside the explicit `return Err(e)` (line 16): the `?`
  # operator on line 14 (`validate(order)?` returns early on Err) and the
  # tail-expression return on line 19 (`Ok(result)`, no `return` keyword, no
  # semicolon — the function's value). Fixed via structural (not
  # node-kind-set) detection in nav_exits.py: `?` parses to a
  # `try_expression` node, but that exact kind string collides with
  # Kotlin's try/catch/finally block, so it's disambiguated by checking for
  # a literal '?' child rather than added to the shared taxonomy; the tail
  # expression has no distinguishing node kind at all, so it's found
  # positionally (last non-brace child of a `function_item`'s own `block`,
  # when not wrapped in a statement kind like `expression_statement`).
  exits:
  - {kind: RETURN, line: 14}
  - {kind: RETURN, line: 16}
  - {kind: RETURN, line: 19}
  ifmap:
  - {keyword: IF, line_start: 15}
  catchmap:
    not_supported: true  # Rust has no try/catch (uses Result/? instead)
  mutations_probe: {range: "14-14", var: result, next_read_line: 15}
  returns:
  - {line: 14, gate_lines: []}
  - {line: 16, gate_lines: [15]}
  - {line: 19, gate_lines: []}
  batch_element: Batch.run
  loopmap:
  - {keyword: FOR, line_start: 53}
  fanout_effects:
  - {line: 55, kind: cache}
  statewrites:
  - {kind: field, line: 54}
  - {kind: cache, line: 55}

