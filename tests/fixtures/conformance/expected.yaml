  outline_functions: [Validate, ProcessOrder, Run]
  calls_validate_callers:
    - {line: 19, function: ProcessOrder}
  imports_unused:
    not_supported: true  # generic import extractor intentionally skips unused-detection (BACK-398)
  varflow_result:
    - {kind: WRITE, line: 21}
    - {kind: READ, line: 24}
    - {kind: WRITE, line: 30}
    - {kind: READ, line: 30}
    - {kind: READ, line: 31}
  sideeffects:
    - {line: 24, kind: file}

