rust:
  entry_function: process_order
  outline_functions: [validate, process_order, run]
  calls_validate_callers:
  - {line: 13, function: process_order}
  imports_unused: ["std::collections::HashMap"]
  varflow_result:
  - {kind: WRITE, line: 14}
  - {kind: "READ/COND", line: 15}    # inside `if let Err(e) = ...` condition (BACK-427)
  - {kind: WRITE, line: 18}
  - {kind: READ, line: 18}
  - {kind: READ, line: 19}
  sideeffects:
  - {line: 15, kind: file}
  # BACK-428 (found this session, not fixed): --exits only sees the one
  # explicit `return Err(e)` (line 16). It misses both of Rust's implicit
  # exit idioms: the `?` operator on line 14 (`validate(order)?` returns
  # early on Err without a `return` keyword) and the tail-expression return
  # on line 19 (`Ok(result)` with no `return`, no semicolon — the function's
  # value). Root cause: --exits/--returns only match `return_statement`/
  # `return_expression` node kinds; both Rust idioms are structurally
  # different node types (`try_expression` postfix `?`, and a bare tail
  # expression). Same disease as BACK-421 (macro-hidden exits) but a
  # different, non-mechanical fix — needs real "what counts as exiting this
  # function" semantics per idiom, not just a node-kind-set extension like
  # BACK-427's if_expression fix was. Left open.
  exits:
  - {kind: RETURN, line: 16}
  ifmap:
  - {keyword: IF, line_start: 15}
  catchmap:
    not_supported: true  # Rust has no try/catch (uses Result/? instead)
  mutations_probe: {range: "14-14", var: result, next_read_line: 15}
  returns:
  - {line: 16, gate_lines: []}

