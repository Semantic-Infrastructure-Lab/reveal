name: Windows Unfrozen Control (BACK-495)

# DISPOSABLE control for BACK-495. Both Nuitka and PyInstaller minimal repros
# failed at parse() with "TypeError: 'bytes' object is not an instance of 'str'
# while processing 'source'" — but reveal.exe crashes at IMPORT (0xC0000409),
# a different point. This runs the controls I should have run first, with NO
# freezing/build at all:
#   1. plain `python ts.py`            -> is the minimal repro even valid unfrozen?
#   2. plain `python -m reveal --version` -> does reveal work unfrozen on Windows?
#
# If (1) also TypeErrors unfrozen => the parse-error thread is a red herring
#   (wrong parse() arg for tree-sitter 0.26), unrelated to reveal's import crash.
# If (2) works unfrozen but the frozen reveal.exe crashes => freezing is the real
#   issue and we isolate the import path next.
#
# Delete once BACK-495 is resolved.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  control:
    name: unfrozen controls
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install reveal (editable) + tree-sitter
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[git,mcp]"
      - name: Write ts.py (bytes) and ts_str.py (str)
        shell: bash
        run: |
          printf '%s\n' \
            'from tree_sitter_language_pack import get_parser' \
            'p = get_parser("python")' \
            't = p.parse(b"x = 1")' \
            'print("TS BYTES OK:", t.root_node.type)' > ts.py
          printf '%s\n' \
            'from tree_sitter_language_pack import get_parser' \
            'p = get_parser("python")' \
            't = p.parse("x = 1")' \
            'print("TS STR OK:", t.root_node.type)' > ts_str.py
      - name: Controls (non-fatal)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== versions ==="
          python -c "import tree_sitter as t, tree_sitter_language_pack as l; print('tree_sitter', getattr(t,'__version__','?')); print('language_pack', getattr(l,'__version__','?'))"
          Write-Host "=== control 1a: plain python ts.py (parse bytes) ==="
          python ts.py; Write-Host "exit: $LASTEXITCODE"
          Write-Host "=== control 1b: plain python ts_str.py (parse str) ==="
          python ts_str.py; Write-Host "exit: $LASTEXITCODE"
          Write-Host "=== control 2: plain python -m reveal --version ==="
          python -m reveal --version; Write-Host "exit: $LASTEXITCODE"
          Write-Host "=== control 3: how does reveal call tree-sitter? (grep parse) ==="
          Select-String -Path reveal\treesitter.py -Pattern "\.parse\(" -SimpleMatch | Select-Object -First 5 | ForEach-Object { Write-Host $_.Line.Trim() }

  reveal-pyinstaller:
    name: full reveal via PyInstaller (readable traceback + tool comparison)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install reveal + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[git,mcp]"
          pip install pyinstaller
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "$pwd\dist"
      - name: Build full reveal (PyInstaller --onedir)
        shell: bash
        run: |
          pyinstaller --noconfirm --onedir --name reveal \
            --collect-all reveal \
            --collect-all tree_sitter \
            --collect-all tree_sitter_language_pack \
            --collect-all pygit2 \
            --collect-all certifi \
            --collect-all jsonschema_specifications \
            reveal/main.py
      - name: Run full reveal (non-fatal, capture traceback)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $exe = "dist\reveal\reveal.exe"
          if (-not (Test-Path $exe)) { $exe = (Get-ChildItem dist -Recurse -Filter reveal.exe | Select-Object -First 1).FullName }
          Write-Host "exe: $exe"
          $p = Start-Process -FilePath $exe -ArgumentList "--version" -NoNewWindow -Wait -PassThru `
                 -RedirectStandardOutput o.txt -RedirectStandardError e.txt
          Write-Host "exit code: $($p.ExitCode)"
          Write-Host "----- stdout -----"; Get-Content o.txt -ErrorAction SilentlyContinue | Write-Host
          Write-Host "----- stderr -----"; Get-Content e.txt -ErrorAction SilentlyContinue | Write-Host
          if ($p.ExitCode -eq 0) { Write-Host "RESULT: PyInstaller full reveal RUNS -> the Nuitka crash is Nuitka-specific; switch tooling." }
          else { Write-Host "RESULT: PyInstaller full reveal FAILS -> frozen-env issue with a reveal native dep; traceback above names it." }
