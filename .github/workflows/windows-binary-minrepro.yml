name: Windows Binary Minimal Repro (BACK-495)

# DISPOSABLE diagnostic for BACK-495. The full reveal.exe crashes at startup
# with 0xC0000409 (fail-fast, zero output); build flags and missing DLLs are
# ruled out. These two minimal Nuitka --standalone builds settle the last fork:
#
#   min1-hello:      print("hello") only  -> does ANY Nuitka standalone exe run
#                    on this runner with Nuitka 4.1.3? (isolates toolchain)
#   min2-treesitter: import tree_sitter_language_pack + parse -> isolates the
#                    tree-sitter native extension, independent of reveal code.
#
# min1 runs + min2 crashes  => tree-sitter is the cause.
# both crash                => Nuitka 4.1.3 / MSVC toolchain, not our deps.
#
# Delete once BACK-495 is resolved.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  min1-hello:
    name: min1 — trivial hello (does Nuitka standalone run at all?)
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Nuitka
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard
      - name: Write hello.py
        shell: bash
        run: printf '%s\n' 'print("HELLO OK")' > hello.py
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "$pwd\dist"
      - name: Build
        shell: bash
        run: python -m nuitka --standalone --assume-yes-for-downloads --output-dir=dist hello.py
      - name: Run (non-fatal)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          python -m nuitka --version
          $p = Start-Process -FilePath "dist\hello.dist\hello.exe" -NoNewWindow -Wait -PassThru `
                 -RedirectStandardOutput o.txt -RedirectStandardError e.txt
          Write-Host "exit code (decimal): $($p.ExitCode)"
          try { Write-Host ("exit code (hex): 0x{0:X8}" -f ([int64]$p.ExitCode -band 0xFFFFFFFF)) } catch {}
          Write-Host "----- stdout -----"; Get-Content o.txt -ErrorAction SilentlyContinue | Write-Host
          Write-Host "----- stderr -----"; Get-Content e.txt -ErrorAction SilentlyContinue | Write-Host
          if ($p.ExitCode -eq 0) { Write-Host "RESULT min1: trivial standalone RUNS." }
          else { Write-Host "RESULT min1: trivial standalone CRASHES — Nuitka/toolchain-wide problem." }

  min2-treesitter:
    name: min2 — import tree_sitter_language_pack (isolate tree-sitter)
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Nuitka + tree-sitter
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard tree-sitter tree-sitter-language-pack
      - name: Write ts.py
        shell: bash
        run: |
          printf '%s\n' \
            'from tree_sitter_language_pack import get_language, get_parser' \
            'lang = get_language("python")' \
            'p = get_parser("python")' \
            't = p.parse(b"x = 1")' \
            'print("TREE-SITTER OK:", t.root_node.type)' > ts.py
          cat ts.py
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "$pwd\dist"
      - name: Build
        shell: bash
        run: |
          python -m nuitka --standalone --assume-yes-for-downloads --output-dir=dist \
            --include-package=tree_sitter \
            --include-package=tree_sitter_language_pack \
            --include-package-data=tree_sitter_language_pack \
            ts.py
      - name: Run (non-fatal)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          python -m nuitka --version
          $p = Start-Process -FilePath "dist\ts.dist\ts.exe" -NoNewWindow -Wait -PassThru `
                 -RedirectStandardOutput o.txt -RedirectStandardError e.txt
          Write-Host "exit code (decimal): $($p.ExitCode)"
          try { Write-Host ("exit code (hex): 0x{0:X8}" -f ([int64]$p.ExitCode -band 0xFFFFFFFF)) } catch {}
          Write-Host "----- stdout -----"; Get-Content o.txt -ErrorAction SilentlyContinue | Write-Host
          Write-Host "----- stderr -----"; Get-Content e.txt -ErrorAction SilentlyContinue | Write-Host
          if ($p.ExitCode -eq 0) { Write-Host "RESULT min2: tree-sitter standalone RUNS." }
          else { Write-Host "RESULT min2: tree-sitter standalone CRASHES — tree-sitter native ext is the cause." }
