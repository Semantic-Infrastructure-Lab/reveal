name: Windows TS Nuitka Version Matrix (BACK-495)

# DISPOSABLE diagnostic for BACK-495. Minimal repro proved tree-sitter's native
# binding is mis-compiled under Nuitka 4.1.3 (parse(bytes) -> "TypeError: 'bytes'
# object is not an instance of 'str' while processing 'source'" — Nuitka's own
# compiled-arg-parser decoration; correct usage in real CPython). This tests
# whether an OLDER Nuitka compiles the tree-sitter binding correctly, which
# would make "pin Nuitka" the release-workflow fix.
#
# Any matrix cell that prints "TREE-SITTER OK" => pin that Nuitka version.
# If ALL cells fail => Nuitka is unfit for tree-sitter here; switch the Windows
# binary to PyInstaller (uses the real interpreter, doesn't recompile the .pyd).
#
# Delete once BACK-495 is resolved.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ts:
    name: ts (nuitka ${{ matrix.nuitka }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        nuitka: ['~=2.4.0', '~=2.5.0', '~=2.6.0', '~=2.7.0', '~=2.8.0']
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Nuitka + tree-sitter
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install "nuitka${{ matrix.nuitka }}" ordered-set zstandard tree-sitter tree-sitter-language-pack
      - name: Write ts.py
        shell: bash
        run: |
          printf '%s\n' \
            'from tree_sitter_language_pack import get_parser' \
            'p = get_parser("python")' \
            't = p.parse(b"x = 1")' \
            'print("TREE-SITTER OK:", t.root_node.type)' > ts.py
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "$pwd\dist"
      - name: Build
        shell: bash
        run: |
          python -m nuitka --standalone --assume-yes-for-downloads --output-dir=dist \
            --include-package=tree_sitter \
            --include-package=tree_sitter_language_pack \
            --include-package-data=tree_sitter_language_pack \
            ts.py
      - name: Run (non-fatal)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== Nuitka version ==="; (python -m nuitka --version)[0]
          $p = Start-Process -FilePath "dist\ts.dist\ts.exe" -NoNewWindow -Wait -PassThru `
                 -RedirectStandardOutput o.txt -RedirectStandardError e.txt
          Write-Host "exit code: $($p.ExitCode)"
          Write-Host "----- stdout -----"; Get-Content o.txt -ErrorAction SilentlyContinue | Write-Host
          Write-Host "----- stderr -----"; Get-Content e.txt -ErrorAction SilentlyContinue | Write-Host
          if ($p.ExitCode -eq 0) { Write-Host "RESULT: nuitka ${{ matrix.nuitka }} -> tree-sitter RUNS (pin candidate)." }
          else { Write-Host "RESULT: nuitka ${{ matrix.nuitka }} -> tree-sitter FAILS." }
