name: Windows TS PyInstaller Probe (BACK-495)

# DISPOSABLE diagnostic for BACK-495. Every Nuitka version (2.4-2.8 + 4.1.3)
# mis-compiles the tree-sitter native binding on Windows (parse(bytes) ->
# TypeError). This validates the proposed fix — PyInstaller bundles the real
# CPython interpreter and copies the .pyd as-is (no recompile), so it should
# build a working tree-sitter binary. Same minimal repro, apples-to-apples.
#
# "TREE-SITTER OK" => PyInstaller is the fix; rewrite windows-binary.yml onto it.
# Fails too       => deeper problem; rethink Windows binary entirely.
#
# Delete once BACK-495 is resolved.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ts-pyinstaller:
    name: ts (PyInstaller --onedir)
    runs-on: windows-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PyInstaller + tree-sitter
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller tree-sitter tree-sitter-language-pack
      - name: Write ts.py
        shell: bash
        run: |
          printf '%s\n' \
            'from tree_sitter_language_pack import get_parser' \
            'p = get_parser("python")' \
            't = p.parse(b"x = 1")' \
            'print("TREE-SITTER OK:", t.root_node.type)' > ts.py
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "$pwd\dist"
      - name: Build (PyInstaller --onedir)
        shell: bash
        run: |
          pyinstaller --noconfirm --onedir \
            --collect-all tree_sitter \
            --collect-all tree_sitter_language_pack \
            ts.py
      - name: Run (non-fatal)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "=== PyInstaller version ==="; pyinstaller --version
          Write-Host "=== dist\ts (top level) ==="
          Get-ChildItem dist\ts -ErrorAction SilentlyContinue | Select-Object Name | Format-Table -AutoSize | Out-String | Write-Host
          $exe = "dist\ts\ts.exe"
          if (-not (Test-Path $exe)) { $exe = (Get-ChildItem dist -Recurse -Filter ts.exe | Select-Object -First 1).FullName }
          Write-Host "exe: $exe"
          $p = Start-Process -FilePath $exe -NoNewWindow -Wait -PassThru `
                 -RedirectStandardOutput o.txt -RedirectStandardError e.txt
          Write-Host "exit code: $($p.ExitCode)"
          Write-Host "----- stdout -----"; Get-Content o.txt -ErrorAction SilentlyContinue | Write-Host
          Write-Host "----- stderr -----"; Get-Content e.txt -ErrorAction SilentlyContinue | Write-Host
          if ($p.ExitCode -eq 0) { Write-Host "RESULT: PyInstaller -> tree-sitter RUNS. Fix = switch Windows binary to PyInstaller." }
          else { Write-Host "RESULT: PyInstaller -> tree-sitter FAILS too. Deeper problem." }
