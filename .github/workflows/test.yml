name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_call:  # Allow this workflow to be called by other workflows

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build  # Required for packaging manifest tests

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: pytest tests/ -v

      - name: Test Windows compatibility checks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          if [ -f scripts/check_windows_compat.py ]; then
            python scripts/check_windows_compat.py --warn
          fi

      - name: Test CLI basics
        shell: bash
        run: |
          reveal --version
          reveal --list-supported

      - name: Reveal self-validation (dogfooding)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        shell: bash
        run: |
          python3 << 'EOF'
          from reveal.adapters.reveal import RevealAdapter
          from reveal.rules import RuleRegistry

          # Run reveal:// self-validation
          adapter = RevealAdapter()
          structure = adapter.get_structure()
          detections = RuleRegistry.check_file(
              file_path='reveal://',
              structure=structure,
              content='',
              select=['V']  # Only validation rules
          )

          if detections:
              print('❌ Reveal self-validation failed:')
              for d in detections:
                  print(f'  [{d.severity.value.upper()}] {d.rule_code}: {d.message}')
              exit(1)

          print('✅ Reveal self-validation passed (all V001-V006 checks)')
          EOF

      - name: I002 circular dependency budget
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        shell: bash
        run: |
          python3 << 'EOF'
          import json, subprocess, sys

          result = subprocess.run(
              ['reveal', 'check', 'reveal/', '--select', 'I002', '--format', 'json'],
              capture_output=True, text=True,
          )
          data = json.loads(result.stdout)
          total = sum(f['issues'] for f in data['files'])

          ceiling = 23
          if total > ceiling:
              print(f'❌ I002 budget exceeded: {total} violations (ceiling: {ceiling})')
              print('  Circular dependencies grew. Resolve cycles or raise ceiling deliberately.')
              sys.exit(1)

          print(f'✅ I002 budget OK: {total}/{ceiling} violations')
          EOF
