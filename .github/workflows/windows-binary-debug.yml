name: Windows Binary Debug (BACK-495)

# DISPOSABLE diagnostic workflow for BACK-495 — the Nuitka --standalone
# reveal.exe crashes on launch with STATUS_STACK_BUFFER_OVERRUN (0xC0000409),
# instant, zero output. This workflow gathers maximum signal in one dispatch:
#
#   Job A (current flags): build exactly as the release workflow does, then a
#     diagnostic step that captures the Windows faulting-module event-log
#     record, the exe's stdout/stderr, the DLL inventory, and the Nuitka
#     version — to find WHERE/WHY it crashes.
#   Job B (minimal flags): same build WITHOUT --python-flag=no_site and
#     --enable-plugin=anti-bloat (the two prime suspects), then smoke-test — to
#     find WHETHER those flags cause it.
#
# Never uploads anything. Delete this file once BACK-495 is resolved.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  current-flags:
    name: A — current flags + diagnostics
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install reveal + Nuitka
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[git,mcp]"
          pip install nuitka ordered-set zstandard
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "$pwd\dist"
      - name: Build with Nuitka --standalone (current flags)
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --output-dir=dist \
            --output-filename=reveal.exe \
            --include-package=reveal \
            --include-package-data=reveal \
            --include-package=tree_sitter \
            --include-package=tree_sitter_language_pack \
            --include-package-data=tree_sitter_language_pack \
            --include-data-dir=plugins=plugins \
            --enable-plugin=anti-bloat \
            --python-flag=no_site \
            reveal/main.py
      - name: Diagnose (non-fatal)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "===== Nuitka version ====="
          python -m nuitka --version
          Write-Host "===== dist\main.dist (top level) ====="
          Get-ChildItem dist\main.dist -ErrorAction SilentlyContinue |
            Select-Object Name,Length | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host "===== python DLL / tree-sitter / .pyd artifacts ====="
          Get-ChildItem dist\main.dist -Recurse -Include python*.dll,*tree*sitter*,*.pyd -ErrorAction SilentlyContinue |
            Select-Object FullName,Length | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host "===== run reveal.exe --version (capture stdout+stderr) ====="
          $p = Start-Process -FilePath "dist\main.dist\reveal.exe" -ArgumentList "--version" `
                 -NoNewWindow -Wait -PassThru `
                 -RedirectStandardOutput out.txt -RedirectStandardError err.txt
          Write-Host "exit code (decimal): $($p.ExitCode)"
          try { Write-Host ("exit code (hex): 0x{0:X8}" -f ([int64]$p.ExitCode -band 0xFFFFFFFF)) } catch {}
          Write-Host "----- stdout -----"; Get-Content out.txt -ErrorAction SilentlyContinue | Write-Host
          Write-Host "----- stderr -----"; Get-Content err.txt -ErrorAction SilentlyContinue | Write-Host
          Write-Host "===== recent Application error events (faulting module) ====="
          Start-Sleep -Seconds 5
          Get-WinEvent -FilterHashtable @{LogName='Application'; Level=2} -MaxEvents 10 -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "--- $($_.TimeCreated) [$($_.ProviderName) id=$($_.Id)] ---"; Write-Host $_.Message }

  minimal-flags:
    name: B — minimal flags (no no_site / anti-bloat)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install reveal + Nuitka
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[git,mcp]"
          pip install nuitka ordered-set zstandard
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "$pwd\dist"
      - name: Build with Nuitka --standalone (minimal flags)
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --output-dir=dist \
            --output-filename=reveal.exe \
            --include-package=reveal \
            --include-package-data=reveal \
            --include-package=tree_sitter \
            --include-package=tree_sitter_language_pack \
            --include-package-data=tree_sitter_language_pack \
            --include-data-dir=plugins=plugins \
            reveal/main.py
      - name: Smoke test + diagnose (non-fatal)
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $p = Start-Process -FilePath "dist\main.dist\reveal.exe" -ArgumentList "--version" `
                 -NoNewWindow -Wait -PassThru `
                 -RedirectStandardOutput out.txt -RedirectStandardError err.txt
          Write-Host "exit code (decimal): $($p.ExitCode)"
          try { Write-Host ("exit code (hex): 0x{0:X8}" -f ([int64]$p.ExitCode -band 0xFFFFFFFF)) } catch {}
          Write-Host "----- stdout -----"; Get-Content out.txt -ErrorAction SilentlyContinue | Write-Host
          Write-Host "----- stderr -----"; Get-Content err.txt -ErrorAction SilentlyContinue | Write-Host
          if ($p.ExitCode -eq 0) { Write-Host "RESULT: minimal-flags build RUNS — a suspect flag is the cause." }
          else {
            Write-Host "RESULT: minimal-flags build ALSO crashes — flags are not the cause."
            Write-Host "===== recent Application error events (faulting module) ====="
            Start-Sleep -Seconds 5
            Get-WinEvent -FilterHashtable @{LogName='Application'; Level=2} -MaxEvents 10 -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "--- $($_.TimeCreated) [$($_.ProviderName) id=$($_.Id)] ---"; Write-Host $_.Message }
          }
