name: Windows Standalone Binary

# Builds a Nuitka --standalone reveal.exe on every GitHub Release.
# Output: reveal-windows-x64.zip attached to the release.
#
# To enable code signing, enroll in Microsoft Artifact Signing
# (Azure/artifact-signing-action@v2; self-employed US/CA, ~$10/mo)
# and set these repository secrets:
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
#   AZURE_CODE_SIGNING_ACCOUNT_NAME, AZURE_CERT_PROFILE_NAME
#
# CRITICAL: always build --standalone (folder), never --onefile.
# --onefile extracts to a temp dir at launch — an AV heuristic that has
# caused signing certificates to be suspended (Nuitka #3842).

on:
  release:
    types: [published]
  workflow_dispatch:  # manual test run — upload step below stays release-only

permissions:
  contents: write   # upload release assets
  id-token: write   # attest-build-provenance

jobs:
  build-windows:
    name: Build Windows standalone binary
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install reveal + Nuitka
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[git,mcp]"
          pip install nuitka ordered-set zstandard

      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: |
          # Windows Defender scans/kills freshly-compiled unsigned binaries as
          # a heuristic false-positive (documented Nuitka issue #2495/#2685) —
          # the "Smoke test the binary" step below crashes with
          # STATUS_STACK_BUFFER_OVERRUN (0xC0000409) without this exclusion.
          # Excluding only the build output, not disabling Defender broadly.
          Add-MpPreference -ExclusionPath "$pwd\dist"

      - name: Build with Nuitka --standalone
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --assume-yes-for-downloads \
            --output-dir=dist \
            --output-filename=reveal.exe \
            --include-package=reveal \
            --include-package-data=reveal \
            --include-package=tree_sitter \
            --include-package=tree_sitter_language_pack \
            --include-package-data=tree_sitter_language_pack \
            --include-data-dir=plugins=plugins \
            --enable-plugin=anti-bloat \
            --python-flag=no_site \
            reveal/main.py

      - name: Package as zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "reveal-$version-windows-x64.zip"
          # Nuitka --standalone names the output folder after the compiled
          # entry script (reveal/main.py -> main.dist); --output-filename only
          # renames the .exe inside it, not the folder itself.
          Compress-Archive -Path dist/main.dist/* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Smoke test the binary
        shell: cmd
        run: dist\main.dist\reveal.exe --version

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ZIP_NAME }}

      # Code signing — uncomment once enrolled in Microsoft Artifact Signing.
      # Signing alone does NOT clear SmartScreen; reputation accrues per-hash
      # over weeks–months of real download volume. Start building it now.
      #
      # Enroll at: https://learn.microsoft.com/en-us/azure/trusted-signing/
      # Required secrets: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
      #   AZURE_CODE_SIGNING_ACCOUNT_NAME, AZURE_CERT_PROFILE_NAME
      # Action: Azure/artifact-signing-action@v2 (v2.0.0, May 2026)
      # azure-code-signing-action is 404; trusted-signing-action redirects here.
      #
      # - name: Sign binary (Microsoft Artifact Signing)
      #   uses: Azure/artifact-signing-action@v2
      #   with:
      #     azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      #     endpoint: https://eus.codesigning.azure.net/
      #     signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
      #     certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
      #     files-folder: dist\main.dist
      #     files-folder-filter: exe
      #     file-digest: SHA256
      #     timestamp-rfc3161: http://timestamp.acs.microsoft.com
      #     timestamp-digest: SHA256

      - name: Upload zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
